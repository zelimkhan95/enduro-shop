<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Enduro Shop</title><style>
body{font-family:Arial;background:#111;color:#fff;margin:0}
header{padding:40px;text-align:center;background:#1b1b1b}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;padding:20px}
.card{background:#222;border-radius:14px;overflow:hidden;box-shadow:0 4px 10px rgba(0,0,0,.4)}
img{width:100%;height:180px;object-fit:cover}
h3,p{padding:0 15px}button{margin:15px;padding:12px 18px;border:none;background:#f60;color:#fff;border-radius:8px}
</style></head><body>
<header><h1>ENDURO SHOP</h1><p>Демонстрационный магазин</p></header>
<div class="grid">
<div class="card"><img src="https://images.unsplash.com/photo-1558981806-ec527fa84c39?w=800"><h3>Enduro 250</h3><p>Цена: 320 000 ₽</p><button>Купить</button></div>
<div class="card"><img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?w=800"><h3>Enduro 300</h3><p>Цена: 430 000 ₽</p><button>Купить</button></div>
<div class="card"><img src="https://images.unsplash.com/photo-1529429611270-82c8d88b7f9d?w=800"><h3>Enduro 450</h3><p>Цена: 690 000 ₽</p><button>Купить</button></div>
</div></body></html>
